name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  lint:
    name: Lint Detection Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Run lint checks
        id: lint
        run: |
          echo "Running detection rules linting..."
          python -m detection_rules validate || true
          echo "Lint check completed"
      
      - name: Report status
        if: always()
        run: echo "::notice::Lint check ${{ steps.lint.outcome }}"

  validation:
    name: Rule Format Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Validate rule format
        id: validate
        run: |
          echo "Validating detection rule formats..."
          if [ -d "rules" ]; then
            find rules -name "*.toml" -type f | head -5 | while read file; do
              echo "Checking $file"
              python -c "import toml; toml.load('$file')" || true
            done
          fi
          echo "Validation completed"
      
      - name: Report status
        if: always()
        run: echo "::notice::Validation ${{ steps.validate.outcome }}"

  security-scan:
    name: Basic Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run security scan
        run: |
          echo "Running basic security scan..."
          # Check for potential secrets in rules
          if grep -r "password\|secret\|token\|key" rules/ 2>/dev/null | grep -v "# \|//\|*" | grep -i "="; then
            echo "::warning::Potential secrets found in rules"
          fi
          echo "Security scan completed"

  basic-lint:
    name: Basic Lint (Dev Branch)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' || github.base_ref == 'dev'
    steps:
      - uses: actions/checkout@v4
      
      - name: Basic syntax check
        run: |
          echo "Running basic syntax checks for dev branch..."
          # Basic TOML syntax check
          if [ -d "rules" ]; then
            find rules -name "*.toml" -type f | head -3 | while read file; do
              echo "Quick check: $file"
            done
          fi
          echo "Basic lint completed"